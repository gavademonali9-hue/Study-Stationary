/* Style the carousel control buttons to make them visible */
.carousel-control-prev-icon,
.carousel-control-next-icon {
    background-color: black; /* Add a visible background color */
    border-radius: 50%; /* Optional: Round the buttons */
    width: 40px; /* Adjust the size of the buttons */
    height: 40px; /* Adjust the size of the buttons */
}

.carousel-control-prev,
.carousel-control-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5; /* Ensure buttons are on top of the images */
    width: 5%; /* Control the button width */
    color: white; /* Button text color */
    background-color: rgba(0, 0, 0, 0.5); /* Optional: Add a semi-transparent background */
}

.carousel-control-prev {
    left: 10px; /* Position the 'previous' button to the left */
}

.carousel-control-next {
    right: 10px; /* Position the 'next' button to the right */
}

        /* Custom styles for the gallery */
.gallery-container {
    display: flex;
    justify-content: center;
    padding-top: 20px;
}

.gallery-item {
    position: relative;
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 4px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease-in-out;
    margin: 10px;
    height: 350px; /* Fixed height for each gallery item */
    width: 300px;  /* Fixed width for each gallery item */
}

.gallery-item:hover {
    transform: scale(1.05);
}

.gallery-item img {
    width: 100%;
    height: 100%; /* Ensure the image fills the height of the container */
    object-fit: cover; /* Ensures the image covers the area without stretching */
    border-radius: 10px;
}

.gallery-item .info {
    position:absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    padding: 10px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
}

.gallery-item:hover .info {
    opacity: 1;
}

/* Modal Styling */
.modal-content {
    border-radius: 15px;
    border: none;
    overflow: hidden;
    max-width: 65%; /* Limit the width of the modal */
    margin: auto; /* Center the modal */
    justify-self: center;
}

.modal-body img {
    width: 100%;
    height: 400px;
    object-fit: contain; /* Ensures the full image is shown in the modal */
    max-width: 600px; /* Set a maximum width to minimize the size of the image */
    margin: 0 ; /* Center the image */
}

/* Optionally, you can also set a max-height to avoid very tall images */
.modal-body {
    max-height: 70vh; /* Limit the height of the modal body */
    overflow-y: auto; /* Add scrolling if the image is too tall */
}

/* Carousel Flex */
.carousel-inner img {
    width: 100%;
    height: 400px; /* Set the height of the carousel images */
    object-fit: contain; /* Ensure the image fits without being cropped */
}

    <!-- Custom JavaScript for Modal Image -->
    <script>
        const galleryItems = document.querySelectorAll('.gallery-item');
        galleryItems.forEach(item => {
            item.addEventListener('click', function () {
                const imgSrc = this.getAttribute('data-bs-img');
                const imgTitle = this.getAttribute('data-bs-title');
                document.getElementById('modalImage').src = imgSrc;
                document.getElementById('imageModalLabel').textContent = imgTitle;
            });
        });

       // Initialize the like counts for all images
let likes = [0, 0, 0, 0, 0, 0, 0, 0, 0]; // Initialize likes for all images (adjusted for 9 images)

// Handle Like Button Click
function likeImage(button) {
    const index = button.getAttribute('data-bs-id'); // Get image index from button
    likes[index - 1]++;  // Increment the like count
    document.getElementById(`like-count-${index}`).textContent = likes[index - 1];  // Update the like count in the UI
}

// Initialize the like counts on page load
window.onload = function () {
    likes.forEach((likeCount, index) => {
        document.getElementById(`like-count-${index + 1}`).textContent = likeCount; // Set initial like count to 0
    });
};

    </script>
